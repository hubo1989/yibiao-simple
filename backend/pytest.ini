[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning:PyPDF2.*
    ignore::UserWarning:app.config.*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services (DB, LLM)
